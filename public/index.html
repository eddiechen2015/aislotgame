<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asian Tour — Test Harness</title>
  <style>
    :root {
      --ink: #1a1a1a;
      --indigo: #1c3553;
      --vermillion: #c14b32;
      --gold: #c9a14a;
      --paper: #f3ece0;
      --paper-dark: #e3d7be;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    header {
      background: var(--indigo);
      color: var(--paper);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    header h1 { margin: 0; font-size: 18px; letter-spacing: 1px; }
    header .badge {
      background: var(--vermillion);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
    }
    header a.badge {
      color: inherit;
      text-decoration: none;
    }
    main { max-width: 1100px; margin: 0 auto; padding: 18px; }
    .panel {
      background: white;
      border: 1px solid var(--paper-dark);
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    }
    .panel h2 { margin: 0 0 10px 0; font-size: 14px; color: var(--indigo); letter-spacing: 0.5px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, button, select {
      font: inherit;
      padding: 7px 10px;
      border-radius: 4px;
      border: 1px solid #bdb39a;
      background: white;
    }
    button {
      background: var(--vermillion);
      color: white;
      border-color: var(--vermillion);
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--paper-dark);
      color: var(--ink);
      border-color: #bdb39a;
    }
    .stat { display: inline-block; padding: 6px 10px; background: var(--paper); border-radius: 4px; margin-right: 8px; }
    .stat b { color: var(--vermillion); }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 70px);
      grid-template-rows: repeat(3, 70px);
      gap: 4px;
      background: var(--ink);
      padding: 4px;
      border-radius: 4px;
      width: max-content;
    }
    .cell {
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      border-radius: 2px;
      position: relative;
      color: var(--ink);
    }
    .cell.low     { background: #efe6cf; }
    .cell.premium { background: #f6dccb; color: var(--vermillion); }
    .cell.wild    { background: var(--gold); color: var(--ink); }
    .cell.scatter { background: var(--indigo); color: var(--paper); }
    .cell .mult {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 11px;
      color: var(--vermillion);
      background: rgba(255,255,255,0.85);
      padding: 0 3px;
      border-radius: 2px;
    }
    .grid-row { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .step-label { font-size: 11px; color: #555; margin-bottom: 4px; }
    pre {
      background: #0e1c2b;
      color: #cfe1f5;
      padding: 10px;
      border-radius: 4px;
      max-height: 320px;
      overflow: auto;
      font-size: 11px;
      line-height: 1.4;
    }
    .hidden { display: none !important; }
    .free-spin-banner {
      background: var(--gold);
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 4px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .cascades-wrap { display: flex; gap: 18px; flex-wrap: wrap; }
    .err { color: var(--vermillion); font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>Asian Tour</h1>
    <span class="badge">ASIAN-TOUR-01 · v0.1.0</span>
    <span class="badge" style="background: var(--gold); color: var(--ink);">TEST HARNESS</span>
    <a class="badge" href="/game.html" style="background: var(--paper); color: var(--ink);">OPEN GAME PAGE</a>
  </header>

  <main>
    <!-- Login -->
    <section class="panel" id="loginPanel">
      <h2>1 · Login</h2>
      <div class="row">
        <input id="username" placeholder="username" value="tester" />
        <input id="password" placeholder="password (any)" value="demo" />
        <button id="loginBtn">Login</button>
        <span id="loginErr" class="err"></span>
      </div>
    </section>

    <!-- Session -->
    <section class="panel hidden" id="sessionPanel">
      <h2>2 · Session</h2>
      <div class="row">
        <span class="stat">user: <b id="who">-</b></span>
        <span class="stat">balance: <b id="balance">-</b></span>
        <span class="stat">last win: <b id="lastWin">0</b></span>
        <span class="stat">scatters: <b id="scCount">0</b></span>
        <button class="secondary" id="logoutBtn">Logout</button>
      </div>
    </section>

    <!-- Spin -->
    <section class="panel hidden" id="spinPanel">
      <h2>3 · Spin</h2>
      <div class="row">
        <label>bet</label>
        <select id="bet">
          <option>0.10</option>
          <option>0.50</option>
          <option selected>1.00</option>
          <option>2.00</option>
          <option>5.00</option>
          <option>10.00</option>
          <option>100.00</option>
        </select>
        <button id="spinBtn">Spin</button>
        <button class="secondary" id="spin10Btn">Spin × 10</button>
        <span id="spinErr" class="err"></span>
      </div>
    </section>

    <!-- Result grid -->
    <section class="panel hidden" id="resultPanel">
      <h2>4 · Result</h2>
      <div id="freeSpinBanner" class="free-spin-banner hidden"></div>
      <div class="step-label">Initial grid</div>
      <div class="grid" id="initialGrid"></div>

      <div id="cascadesContainer" style="margin-top: 14px;"></div>

      <div id="freeSpinsContainer" style="margin-top: 14px;"></div>
    </section>

    <!-- Raw JSON -->
    <section class="panel hidden" id="jsonPanel">
      <h2>5 · Raw response</h2>
      <pre id="jsonOut"></pre>
    </section>
  </main>

  <script>
    const SYMBOL_KIND = {
      A: "low", K: "low", Q: "low", J: "low", "10": "low",
      NINJA: "premium", DRAGON: "premium", PHOENIX: "premium", SHOGUN: "premium",
      WILD: "wild", SCATTER: "scatter",
    };
    const SYMBOL_LABEL = {
      A: "A", K: "K", Q: "Q", J: "J", "10": "10",
      NINJA: "NIN", DRAGON: "DRG", PHOENIX: "PHX", SHOGUN: "SHO",
      WILD: "WILD", SCATTER: "SCT",
    };

    let token = null;
    const $ = (id) => document.getElementById(id);

    function show(id) { $(id).classList.remove("hidden"); }
    function hide(id) { $(id).classList.add("hidden"); }

    function renderGrid(parent, grid) {
      parent.innerHTML = "";
      // grid is [reel][row] — we render row-major (row 0 on top).
      const cols = grid.length;
      const rows = grid[0].length;
      parent.style.gridTemplateColumns = `repeat(${cols}, 70px)`;
      parent.style.gridTemplateRows = `repeat(${rows}, 70px)`;
      for (let y = 0; y < rows; y++) {
        for (let r = 0; r < cols; r++) {
          const cell = grid[r][y];
          const div = document.createElement("div");
          div.className = `cell ${SYMBOL_KIND[cell.symbol] || ""}`;
          div.textContent = SYMBOL_LABEL[cell.symbol] || cell.symbol;
          if (cell.multiplier) {
            const m = document.createElement("span");
            m.className = "mult";
            m.textContent = `×${cell.multiplier}`;
            div.appendChild(m);
          }
          parent.appendChild(div);
        }
      }
    }

    function renderCascades(parent, cascades) {
      parent.innerHTML = "";
      if (!cascades || cascades.length === 0) {
        parent.innerHTML = '<div class="step-label">No cascade wins this spin.</div>';
        return;
      }
      const wrap = document.createElement("div");
      wrap.className = "cascades-wrap";
      cascades.forEach((c) => {
        const block = document.createElement("div");
        const lbl = document.createElement("div");
        lbl.className = "step-label";
        lbl.innerHTML = `cascade #${c.index + 1} · win <b>${c.cascadeWin.toFixed(2)}</b>` +
          (c.wins.length ? ` · ${c.wins.map(w => `${w.symbol}×${w.matchCount}(${w.waysCount}w)`).join(", ")}` : "");
        const g = document.createElement("div");
        g.className = "grid";
        renderGrid(g, c.gridAfter);
        block.appendChild(lbl);
        block.appendChild(g);
        wrap.appendChild(block);
      });
      parent.appendChild(wrap);
    }

    function renderFreeSpins(parent, fs) {
      parent.innerHTML = "";
      if (!fs) return;
      const banner = document.createElement("div");
      banner.className = "step-label";
      banner.innerHTML = `<b>Free spins:</b> ${fs.totalSpins} spins · total FS win <b>${fs.totalWin.toFixed(2)}</b>`;
      parent.appendChild(banner);
      const wrap = document.createElement("div");
      wrap.className = "cascades-wrap";
      fs.spins.forEach((s) => {
        const block = document.createElement("div");
        const lbl = document.createElement("div");
        lbl.className = "step-label";
        lbl.innerHTML = `FS #${s.index} · mult <b>×${s.multiplierStep}</b> · win <b>${s.spinWin.toFixed(2)}</b>` +
          (s.retrigger ? ' · <span style="color:#c14b32">RETRIGGER</span>' : '');
        const g = document.createElement("div");
        g.className = "grid";
        renderGrid(g, s.initialGrid);
        block.appendChild(lbl);
        block.appendChild(g);
        wrap.appendChild(block);
      });
      parent.appendChild(wrap);
    }

    async function api(path, opts = {}) {
      const headers = { "content-type": "application/json", ...(opts.headers || {}) };
      if (token) headers.authorization = `Bearer ${token}`;
      const res = await fetch(path, { ...opts, headers });
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : null; } catch { data = { error: text }; }
      if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);
      return data;
    }

    $("loginBtn").onclick = async () => {
      $("loginErr").textContent = "";
      try {
        const u = $("username").value.trim();
        const data = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ username: u, password: $("password").value }),
        });
        token = data.token;
        $("who").textContent = data.username;
        $("balance").textContent = data.balance.toFixed(2);
        hide("loginPanel");
        show("sessionPanel");
        show("spinPanel");
      } catch (e) {
        $("loginErr").textContent = e.message;
      }
    };

    $("logoutBtn").onclick = () => {
      token = null;
      ["sessionPanel","spinPanel","resultPanel","jsonPanel"].forEach(hide);
      show("loginPanel");
    };

    async function doSpin() {
      $("spinErr").textContent = "";
      try {
        const bet = parseFloat($("bet").value);
        const r = await api("/api/spin", {
          method: "POST",
          body: JSON.stringify({ bet }),
        });
        $("balance").textContent = r.balance.toFixed(2);
        $("lastWin").textContent = r.totalWin.toFixed(2);
        $("scCount").textContent = r.base.scatterCount;
        show("resultPanel");
        show("jsonPanel");
        const banner = $("freeSpinBanner");
        if (r.base.freeSpinsTriggered) {
          banner.classList.remove("hidden");
          banner.textContent = `★ FREE SPINS TRIGGERED — ${r.base.scatterCount} scatters · scatter pay ${r.base.scatterPay.toFixed(2)}`;
        } else {
          banner.classList.add("hidden");
        }
        renderGrid($("initialGrid"), r.base.initialGrid);
        renderCascades($("cascadesContainer"), r.base.cascades);
        renderFreeSpins($("freeSpinsContainer"), r.freeSpins);
        $("jsonOut").textContent = JSON.stringify(r, null, 2);
        return r;
      } catch (e) {
        $("spinErr").textContent = e.message;
      }
    }

    $("spinBtn").onclick = doSpin;
    $("spin10Btn").onclick = async () => {
      $("spin10Btn").disabled = true;
      try { for (let i = 0; i < 10; i++) await doSpin(); }
      finally { $("spin10Btn").disabled = false; }
    };
  </script>
</body>
</html>
